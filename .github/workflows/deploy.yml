name: Deploy Puerto Rico Game (Cloudflare Pages + Supabase)

on:
  push:
    branches: [main, master, 'claude/**']
  workflow_dispatch:

env:
  NODE_VERSION: '22'

jobs:
  # ============================================
  # Lint + Typecheck Frontend
  # ============================================
  check-frontend:
    name: Lint & Typecheck Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Lint
        working-directory: ./frontend
        run: npm run lint

      - name: Typecheck
        working-directory: ./frontend
        run: npm run typecheck

  # ============================================
  # Deno Check Edge Functions
  # ============================================
  check-edge-functions:
    name: Typecheck Edge Functions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x

      - name: Deno type check
        run: |
          deno check supabase/functions/create-room/index.ts
          deno check supabase/functions/join-room/index.ts
          deno check supabase/functions/start-game/index.ts
          deno check supabase/functions/game-action/index.ts

  # ============================================
  # Build Frontend
  # ============================================
  build-frontend:
    name: Build Frontend
    needs: [check-frontend, check-edge-functions]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build
        working-directory: ./frontend
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist
          retention-days: 1

  # ============================================
  # Deploy Frontend to Cloudflare Pages
  # ============================================
  deploy-frontend:
    name: Deploy to Cloudflare Pages
    needs: build-frontend
    runs-on: ubuntu-latest
    steps:
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: dist

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy dist --project-name=puerto-rico-game --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  # ============================================
  # Apply Supabase DB Migrations
  # ============================================
  supabase-migrate:
    name: Apply Supabase Migrations
    needs: [check-frontend, check-edge-functions]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Run DB Migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase link --project-ref rqpueewuuyjjnfglxpui
          supabase db push

  # ============================================
  # Deploy Supabase Edge Functions
  # ============================================
  deploy-functions:
    name: Deploy Edge Functions
    needs: supabase-migrate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Edge Functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase link --project-ref rqpueewuuyjjnfglxpui
          supabase functions deploy create-room
          supabase functions deploy join-room
          supabase functions deploy start-game
          supabase functions deploy game-action

  # ============================================
  # Notify on Completion
  # ============================================
  notify:
    name: Deployment Summary
    needs: [deploy-frontend, deploy-functions]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Summary
        run: |
          echo "Puerto Rico Game Deployment Complete!"
          echo "Frontend: https://puerto-rico-game.pages.dev"
          echo "Supabase:  https://rqpueewuuyjjnfglxpui.supabase.co"