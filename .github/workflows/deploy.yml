name: Deploy Puerto Rico Game (Cloudflare Pages + Supabase)

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  NODE_VERSION: '22'

jobs:
  # ============================================
  # Build Frontend
  # ============================================
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build
        working-directory: ./frontend
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist
          retention-days: 1

  # ============================================
  # Deploy Frontend to Cloudflare Pages
  # ============================================
  deploy-frontend:
    name: Deploy to Cloudflare Pages
    needs: build-frontend
    runs-on: ubuntu-latest
    steps:
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: dist

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: puerto-rico-game
          directory: dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

  # ============================================
  # Apply Supabase DB Migrations
  # ============================================
  supabase-migrate:
    name: Apply Supabase Migrations
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Run DB Migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase link --project-ref rqpueewuuyjjnfglxpui
          supabase db push

  # ============================================
  # Deploy Supabase Edge Functions
  # ============================================
  deploy-functions:
    name: Deploy Edge Functions
    needs: supabase-migrate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Edge Functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase link --project-ref rqpueewuuyjjnfglxpui
          supabase functions deploy create-room
          supabase functions deploy join-room
          supabase functions deploy start-game
          supabase functions deploy game-action

  # ============================================
  # Notify on Completion
  # ============================================
  notify:
    name: Deployment Summary
    needs: [deploy-frontend, deploy-functions]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Summary
        run: |
          echo "Puerto Rico Game Deployment Complete!"
          echo "Frontend: https://puerto-rico-game.pages.dev"
          echo "Supabase:  https://rqpueewuuyjjnfglxpui.supabase.co"