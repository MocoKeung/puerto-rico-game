<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Builder Role Icon - Buildings/Hammers -->
  <defs>
    <linearGradient id="builderBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#CD853F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B4513;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="hammerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#708090;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2F4F4F;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Badge Background -->
  <circle cx="50" cy="50" r="46" fill="url(#builderBg)" stroke="#654321" stroke-width="2"/>
  <circle cx="50" cy="50" r="38" fill="#FAF0E6"/>
  
  <!-- Decorative brick pattern -->
  <rect x="20" y="65" width="8" height="5" fill="#D2691E" opacity="0.3"/>
  <rect x="30" y="65" width="8" height="5" fill="#D2691E" opacity="0.3"/>
  <rect x="40" y="65" width="8" height="5" fill="#D2691E" opacity="0.3"/>
  <rect x="52" y="65" width="8" height="5" fill="#D2691E" opacity="0.3"/>
  <rect x="62" y="65" width="8" height="5" fill="#D2691E" opacity="0.3"/>
  <rect x="72" y="65" width="8" height="5" fill="#D2691E" opacity="0.3"/>
  
  <!-- Hammer Icon -->
  <g transform="translate(50, 45) rotate(-45)">
    <!-- Handle -->
    <rect x="-3" y="-15" width="6" height="35" rx="2" fill="#8B4513" stroke="#654321" stroke-width="1"/>
    <!-- Hammer head -->
    <rect x="-12" y="-25" width="24" height="12" rx="2" fill="url(#hammerGrad)" stroke="#2F4F4F" stroke-width="1"/>
    <!-- Hammer face -->
    <rect x="-14" y="-23" width="3" height="8" fill="#708090"/>
    <rect x="11" y="-23" width="3" height="8" fill="#708090"/>
  </g>
  
  <!-- Building silhouette behind -->
  <g fill="#DEB887" opacity="0.4">
    <rect x="30" y="50" width="12" height="15"/>
    <rect x="44" y="45" width="12" height="20"/>
    <rect x="58" y="48" width="10" height="17"/>
    <!-- Roofs -->
    <polygon points="30,50 36,42 42,50"/>
    <polygon points="44,45 50,36 56,45"/>
    <polygon points="58,48 63,40 68,48"/>
  </g>
  
  <!-- Label -->
  <text x="50" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#654321" font-weight="bold">BUILDER</text>
</svg>