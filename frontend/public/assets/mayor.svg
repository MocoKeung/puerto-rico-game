<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Mayor Role Icon - People/Management -->
  <defs>
    <linearGradient id="mayorBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4169E1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#191970;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="crownGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#DAA520;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Badge Background -->
  <circle cx="50" cy="50" r="46" fill="url(#mayorBg)" stroke="#191970" stroke-width="2"/>
  <circle cx="50" cy="50" r="38" fill="#F0F8FF"/>
  
  <!-- People Icon -->
  <g transform="translate(50, 55)">
    <!-- Center Mayor (larger) -->
    <circle cx="0" cy="-5" r="10" fill="#4169E1"/>
    <path d="M -8,-5 Q 0,-15 8,-5" fill="#FFD700"/>
    <rect x="-10" y="2" width="20" height="18" rx="3" fill="#4169E1"/>
    <rect x="-7" y="6" width="5" height="3" fill="white"/> <!-- Collar -->
    <rect x="2" y="6" width="5" height="3" fill="white"/>
    <circle cx="0" cy="-20" r="4" fill="url(#crownGrad)"> <!-- Crown -->
      <animate attributeName="r" values="4;4.5;4" dur="2s" repeatCount="indefinite"/>
    </circle>
    <polygon points="-6,-18 0,-28 6,-18" fill="url(#crownGrad)"/>
    
    <!-- Left Colonist -->
    <circle cx="-22" cy="2" r="7" fill="#708090"/>
    <rect x="-26" y="8" width="10" height="14" rx="2" fill="#708090"/>
    
    <!-- Right Colonist -->
    <circle cx="22" cy="2" r="7" fill="#708090"/>
    <rect x="18" y="8" width="10" height="14" rx="2" fill="#708090"/>
    
    <!-- Back row colonists -->
    <circle cx="-35" cy="5" r="5" fill="#A9A9A9"/>
    <circle cx="35" cy="5" r="5" fill="#A9A9A9"/>
    <circle cx="0" cy="-22" r="4" fill="#A9A9A9"/>
  </g>
  
  <!-- Label -->
  <text x="50" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#191970" font-weight="bold">MAYOR</text>
</svg>