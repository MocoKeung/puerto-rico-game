<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Tobacco Icon - Rich Brown -->
  <defs>
    <linearGradient id="tobaccoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D2691E;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8B4513;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#654321;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="leafGrad3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9ACD32;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#228B22;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="50" cy="50" r="45" fill="#FFF8DC" stroke="#8B4513" stroke-width="2"/>
  
  <!-- Tobacco Plant -->
  <g transform="translate(50, 52)">
    <!-- Stem -->
    <line x1="0" y1="30" x2="0" y2="-15" stroke="#228B22" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Large Tobacco Leaves -->
    <!-- Bottom leaves -->
    <path d="M 0,15 Q -25,10 -35,20 Q -30,35 -5,20" fill="url(#leafGrad3)" stroke="#228B22" stroke-width="0.5"/>
    <path d="M 0,15 Q 25,10 35,20 Q 30,35 5,20" fill="url(#leafGrad3)" stroke="#228B22" stroke-width="0.5"/>
    
    <!-- Middle leaves -->
    <path d="M 0,0 Q -22,-5 -32,5 Q -25,18 -2,5" fill="url(#leafGrad3)" stroke="#228B22" stroke-width="0.5"/>
    <path d="M 0,0 Q 22,-5 32,5 Q 25,18 2,5" fill="url(#leafGrad3)" stroke="#228B22" stroke-width="0.5"/>
    
    <!-- Top leaves -->
    <path d="M 0,-10 Q -18,-15 -28,-5 Q -22,8 -2,-5" fill="url(#leafGrad3)" stroke="#228B22" stroke-width="0.5"/>
    <path d="M 0,-10 Q 18,-15 28,-5 Q 22,8 2,-5" fill="url(#leafGrad3)" stroke="#228B22" stroke-width="0.5"/>
    
    <!-- Tobacco Flowers -->
    <g fill="url(#tobaccoGrad)">
      <ellipse cx="0" cy="-22" rx="5" ry="7"/>
      <ellipse cx="-4" cy="-18" rx="4" ry="5.5"/>
      <ellipse cx="4" cy="-18" rx="4" ry="5.5"/>
      <ellipse cx="0" cy="-15" rx="3.5" ry="4"/>
    </g>
    <circle cx="0" cy="-20" r="2" fill="#FFD700"/>
  </g>
  
  <!-- Label -->
  <text x="50" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#8B4513" font-weight="bold">TOBACCO</text>
</svg>