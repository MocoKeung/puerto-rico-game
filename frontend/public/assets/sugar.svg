<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Sugar Cane Icon - Pale Green/Cream -->
  <defs>
    <linearGradient id="caneGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#90EE90;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#F5F5DC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#90EE90;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="leafGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#32CD32;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#228B22;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="50" cy="50" r="45" fill="#F0FFF0" stroke="#9ACD32" stroke-width="2"/>
  
  <!-- Sugar Cane -->
  <g transform="translate(50, 50) rotate(10)">
    <!-- Main stalk segments -->
    <rect x="-6" y="-30" width="12" height="15" rx="2" fill="url(#caneGrad)" stroke="#6B8E23" stroke-width="1"/>
    <rect x="-6" y="-15" width="12" height="15" rx="2" fill="url(#caneGrad)" stroke="#6B8E23" stroke-width="1"/>
    <rect x="-6" y="0" width="12" height="15" rx="2" fill="url(#caneGrad)" stroke="#6B8E23" stroke-width="1"/>
    <rect x="-6" y="15" width="12" height="12" rx="2" fill="url(#caneGrad)" stroke="#6B8E23" stroke-width="1"/>
    
    <!-- Segment rings -->
    <line x1="-6" y1="-15" x2="6" y2="-15" stroke="#6B8E23" stroke-width="1"/>
    <line x1="-6" y1="0" x2="6" y2="0" stroke="#6B8E23" stroke-width="1"/>
    <line x1="-6" y1="15" x2="6" y2="15" stroke="#6B8E23" stroke-width="1"/>
    
    <!-- Leaves -->
    <path d="M 0,-25 Q -20,-35 -25,-45 Q -15,-40 0,-30" fill="url(#leafGrad2)"/>
    <path d="M 0,-20 Q 20,-30 25,-40 Q 15,-35 0,-25" fill="url(#leafGrad2)"/>
    <path d="M 0,-5 Q -18,-15 -22,-25 Q -12,-20 0,-10" fill="url(#leafGrad2)"/>
    <path d="M 0,10 Q 18,0 22,-10 Q 12,-5 0,5" fill="url(#leafGrad2)"/>
  </g>
  
  <!-- Label -->
  <text x="50" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#556B2F" font-weight="bold">SUGAR</text>
</svg>