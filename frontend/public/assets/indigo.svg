<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Indigo Icon - Deep Purple -->
  <defs>
    <linearGradient id="indigoGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#4B0082;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#6A0DAD;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9370DB;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#228B22;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#006400;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="50" cy="50" r="45" fill="#F3E5F5" stroke="#4B0082" stroke-width="2"/>
  
  <!-- Indigo Plant -->
  <g transform="translate(50, 55)">
    <!-- Stem -->
    <line x1="0" y1="25" x2="0" y2="-10" stroke="#228B22" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Leaves -->
    <path d="M 0,-5 Q -15,-15 -20,-5 Q -15,5 0,-5" fill="url(#leafGrad)"/>
    <path d="M 0,5 Q 15,-5 20,5 Q 15,15 0,5" fill="url(#leafGrad)"/>
    <path d="M 0,15 Q -12,5 -16,15 Q -12,25 0,15" fill="url(#leafGrad)"/>
    
    <!-- Indigo Flowers (spike) -->
    <g fill="url(#indigoGrad)">
      <ellipse cx="0" cy="-18" rx="4" ry="6"/>
      <ellipse cx="-3" cy="-14" rx="3.5" ry="5"/>
      <ellipse cx="3" cy="-14" rx="3.5" ry="5"/>
      <ellipse cx="0" cy="-10" rx="3" ry="4.5"/>
      <ellipse cx="-2" cy="-6" rx="2.5" ry="4"/>
      <ellipse cx="2" cy="-6" rx="2.5" ry="4"/>
    </g>
  </g>
  
  <!-- Label -->
  <text x="50" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#4B0082" font-weight="bold">INDIGO</text>
</svg>