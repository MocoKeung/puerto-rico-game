<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Corn Icon - Golden Yellow -->
  <defs>
    <linearGradient id="cornGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F9E79F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F4D03F;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="50" cy="50" r="45" fill="#FEF9E7" stroke="#F4D03F" stroke-width="2"/>
  
  <!-- Corn Cob -->
  <g transform="translate(50, 50) rotate(-15)">
    <!-- Cob body -->
    <ellipse cx="0" cy="0" rx="22" ry="32" fill="url(#cornGrad)" stroke="#D4AC0D" stroke-width="1.5"/>
    <!-- Kernel rows -->
    <g fill="#D4AC0D" opacity="0.4">
      <ellipse cx="-10" cy="-20" rx="3" ry="4"/>
      <ellipse cx="0" cy="-20" rx="3" ry="4"/>
      <ellipse cx="10" cy="-20" rx="3" ry="4"/>
      <ellipse cx="-12" cy="-8" rx="3" ry="4"/>
      <ellipse cx="-4" cy="-8" rx="3" ry="4"/>
      <ellipse cx="8" cy="-8" rx="3" ry="4"/>
      <ellipse cx="-12" cy="6" rx="3" ry="4"/>
      <ellipse cx="0" cy="6" rx="3" ry="4"/>
      <ellipse cx="12" cy="6" rx="3" ry="4"/>
      <ellipse cx="-8" cy="20" rx="3" ry="4"/>
      <ellipse cx="8" cy="20" rx="3" ry="4"/>
    </g>
    <!-- Green husk -->
    <path d="M -18,-15 Q -22,0 -18,15" fill="none" stroke="#27AE60" stroke-width="3" stroke-linecap="round"/>
    <path d="M 18,-15 Q 22,0 18,15" fill="none" stroke="#27AE60" stroke-width="3" stroke-linecap="round"/>
  </g>
  
  <!-- Label -->
  <text x="50" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7D6608" font-weight="bold">CORN</text>
</svg>