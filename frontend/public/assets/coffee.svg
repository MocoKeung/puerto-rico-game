<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Coffee Icon - Deep Brown -->
  <defs>
    <linearGradient id="beanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6F4E37;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#3D2817;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2F1810;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cherryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6347;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#DC143C;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="leafGrad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#32CD32;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#006400;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="50" cy="50" r="45" fill="#FAEBD7" stroke="#3D2817" stroke-width="2"/>
  
  <!-- Coffee Branch -->
  <g transform="translate(50, 52)">
    <!-- Branch -->
    <path d="M -20,20 Q 0,15 20,20" fill="none" stroke="#8B4513" stroke-width="4" stroke-linecap="round"/>
    <line x1="0" y1="17" x2="-5" y2="-5" stroke="#8B4513" stroke-width="3" stroke-linecap="round"/>
    <line x1="0" y1="17" x2="8" y2="-3" stroke="#8B4513" stroke-width="2.5" stroke-linecap="round"/>
    
    <!-- Coffee Leaves -->
    <g fill="url(#leafGrad4)">
      <ellipse cx="-8" cy="-2" rx="12" ry="5" transform="rotate(-30 -8 -2)"/>
      <ellipse cx="-8" cy="-2" rx="12" ry="5" transform="rotate(30 -8 -2)"/>
      <ellipse cx="12" cy="0" rx="10" ry="4" transform="rotate(-20 12 0)"/>
      <ellipse cx="12" cy="0" rx="10" ry="4" transform="rotate(40 12 0)"/>
    </g>
    
    <!-- Coffee Cherries -->
    <g fill="url(#cherryGrad)" stroke="#8B0000" stroke-width="0.5">
      <circle cx="-3" cy="-8" r="5"/>
      <circle cx="3" cy="-10" r="4.5"/>
      <circle cx="8" cy="-5" r="4"/>
    </g>
    
    <!-- Highlight on cherries -->
    <g fill="#FF6B6B">
      <circle cx="-4.5" cy="-9.5" r="1.5"/>
      <circle cx="1.8" cy="-11" r="1.3"/>
      <circle cx="6.8" cy="-6.2" r="1.2"/>
    </g>
  </g>
  
  <!-- Coffee Beans accent -->
  <g transform="translate(72, 72)" fill="url(#beanGrad)">
    <ellipse cx="0" cy="0" rx="5" ry="7" transform="rotate(30)"/>
    <path d="M -2,0 Q 0,-2 2,0" fill="none" stroke="#2F1810" stroke-width="1" opacity="0.6"/>
  </g>
  <g transform="translate(78, 65)" fill="url(#beanGrad)">
    <ellipse cx="0" cy="0" rx="4" ry="6" transform="rotate(-20)"/>
    <path d="M -1.5,0 Q 0,-1.5 1.5,0" fill="none" stroke="#2F1810" stroke-width="0.8" opacity="0.6"/>
  </g>
  
  <!-- Label -->
  <text x="50" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#3D2817" font-weight="bold">COFFEE</text>
</svg>