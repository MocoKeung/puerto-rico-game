<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Settler Role Icon - Plants/Harvests -->
  <defs>
    <linearGradient id="settlerBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F4D03F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#DAA520;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="plantGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#90EE90;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#228B22;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Badge Background -->
  <circle cx="50" cy="50" r="46" fill="url(#settlerBg)" stroke="#B8860B" stroke-width="2"/>
  <circle cx="50" cy="50" r="38" fill="#FFFAF0"/>
  
  <!-- Inner decorative ring -->
  <circle cx="50" cy="50" r="34" fill="none" stroke="#DAA520" stroke-width="1" stroke-dasharray="4,2"/>
  
  <!-- Plants/Growing symbol -->
  <g transform="translate(50, 55)">
    <!-- Three seedlings -->
    <g transform="translate(-18, 0)">
      <path d="M 0,20 L 0,-5" stroke="#228B22" stroke-width="2"/>
      <ellipse cx="0" cy="-8" rx="5" ry="8" fill="url(#plantGrad)"/>
      <ellipse cx="0" cy="-8" rx="2" ry="4" fill="#90EE90" opacity="0.5"/>
    </g>
    <g transform="translate(0, 5)">
      <path d="M 0,15 L 0,-8" stroke="#228B22" stroke-width="2.5"/>
      <ellipse cx="0" cy="-11" rx="6" ry="10" fill="url(#plantGrad)"/>
      <ellipse cx="0" cy="-11" rx="2.5" ry="5" fill="#90EE90" opacity="0.5"/>
    </g>
    <g transform="translate(18, 0)">
      <path d="M 0,20 L 0,-5" stroke="#228B22" stroke-width="2"/>
      <ellipse cx="0" cy="-8" rx="5" ry="8" fill="url(#plantGrad)"/>
      <ellipse cx="0" cy="-8" rx="2" ry="4" fill="#90EE90" opacity="0.5"/>
    </g>
    
    <!-- Soil line -->
    <line x1="-25" y1="20" x2="25" y2="20" stroke="#8B4513" stroke-width="3" stroke-linecap="round"/>
  </g>
  
  <!-- Star accent at top -->
  <polygon points="50,15 53,22 60,22 54,27 56,34 50,30 44,34 46,27 40,22 47,22" fill="#FFD700" stroke="#DAA520" stroke-width="0.5"/>
  
  <!-- Label -->
  <text x="50" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#8B4513" font-weight="bold">SETTLER</text>
</svg>